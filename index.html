<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warung Barokah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ===== HEADER / NAVIGASI ===== -->
    <header>
      <button class="nav-btn active" id="menuGudang">📦 Gudang</button>
      <button class="nav-btn" id="menuBelanja">🛒 Belanja</button>
      <button id="toggleDark" class="dark-toggle">🌙</button>
    </header>

    <!-- ===== HALAMAN GUDANG ===== -->
    <div class="content" id="pageGudang">
      <h2>📦 Gudang Barang</h2>

      <input type="text" id="search" placeholder="🔍 Cari barang...">

      <div class="filter-wrapper">
        <button class="filter-btn active" data-kategori="">Semua</button>
        <button class="filter-btn" data-kategori="Item lain">Item lain</button>
        <button class="filter-btn" data-kategori="Minuman">Minuman</button>
        <button class="filter-btn" data-kategori="Snack">Snack</button>
        <button class="filter-btn" data-kategori="Rokok">Rokok</button>
        <button class="filter-btn" data-kategori="Sembako">Sembako</button>
      </div>

      <div id="tabelBarang" class="barang-list-container"></div>
    </div>

    <!-- ===== HALAMAN BELANJA ===== -->
    <div class="content" id="pageBelanja" style="display:none;">
      <h2>🛒 Belanja Agen</h2>

      <input type="text" id="searchBelanja" placeholder="🔎 Cari barang...">

      <div id="listBelanja"></div>

      <h3 class="section-title">🧺 Keranjang</h3>
      <div id="keranjangBelanja"></div>

      <div id="totalBelanja" class="total-belanja"></div>

      <button id="printBelanja" class="btn-simpan">🧾 Cetak Daftar Belanja</button>
    </div>

    <!-- FAB Tambah Barang (hanya tampil di halaman Gudang) -->
    <button class="fab" id="openModal" title="Tambah Barang">＋</button>

  </div>

  <!-- ===== MODAL FORM BARANG ===== -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <button class="close-btn" id="closeModal" title="Tutup">✕</button>
      <h3>📝 Data Barang</h3>
      <form id="barangForm">
        <input type="hidden" id="docId">

        <input type="text" id="nama" placeholder="Nama Barang (Contoh: Indomie Goreng)" required>

        <div class="input-group">
          <label>Harga Modal Agen (Rahasia)</label>
          <input type="number" id="hargaAgen" placeholder="Harga beli dari agen" required>
        </div>

        <div class="input-group">
          <label>Harga Jual (Tampilan Depan)</label>
          <input type="text" id="catatanUtama" placeholder="Contoh: 1/4: 5rb | 1kg: 18rb" required>
        </div>

        <div class="input-group">
          <label>Rincian Lengkap (Muncul saat diklik)</label>
          <textarea id="catatanHarga" placeholder="Contoh: Modal 16rb, plastik 500..." rows="3"></textarea>
        </div>

        <div class="input-group">
          <label>Satuan Beli (Pilih untuk struk belanja)</label>
          <select id="satuanBeli" required>
            <option value="">Pilih Satuan</option>
            <option>pcs</option>
            <option>pack</option>
            <option>rtg</option>
            <option>dus</option>
            <option>karton</option>
            <option>sak/karung</option>
            <option>Slop</option>
          </select>
        </div>

        <div class="input-group">
          <label>Kategori</label>
          <select id="kategori" required>
            <option value="">Pilih Kategori</option>
            <option>Item lain</option>
            <option>Minuman</option>
            <option>Snack</option>
            <option>Rokok</option>
            <option>Sembako</option>
          </select>
        </div>

        <button type="submit" class="btn-simpan">💾 Simpan</button>
      </form>
    </div>
  </div>

  <!-- ===== FIREBASE CDN ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
